version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jss_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: jss_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: jss_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: jss_marketplace
      MYSQL_ROOT_PASSWORD: secretpassword
    ports:
      - "3306:3306"
    volumes:
      - jss_dbdata:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: jss_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  jss_dbdata:
